<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Belanja - TIDURLAH GRAFIKA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f5f5f5;
            padding: 20px;
            line-height: 1.4;
        }

        .receipt-container {
            max-width: 350px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 2px dashed #ddd;
        }

        .print-button {
            display: block;
            width: 200px;
            margin: 0 auto 20px auto;
            padding: 12px 24px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, sans-serif;
            transition: background-color 0.2s;
        }

        .print-button:hover {
            background: #e55a2b;
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .store-logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .store-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .separator {
            border-top: 1px dashed #333;
            margin: 15px 0;
        }

        .receipt-meta {
            font-size: 12px;
            margin-bottom: 15px;
        }

        .receipt-meta div {
            margin-bottom: 4px;
        }

        .items-list {
            margin: 15px 0;
        }

        .item {
            margin-bottom: 12px;
            font-size: 12px;
        }

        .item-name {
            font-weight: bold;
            margin-bottom: 2px;
        }

        .item-details {
            display: flex;
            justify-content: space-between;
            padding-left: 10px;
            color: #666;
        }

        .summary {
            margin-top: 15px;
            font-size: 12px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .total-row {
            font-weight: bold;
            font-size: 14px;
            border-top: 1px solid #333;
            padding-top: 8px;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #666;
        }

        .footer-message {
            margin-bottom: 8px;
            font-weight: bold;
        }

        .no-data {
            text-align: center;
            color: #666;
            font-size: 14px;
            padding: 40px 20px;
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .print-button {
                display: none;
            }

            .receipt-container {
                box-shadow: none;
                border: none;
                border-radius: 0;
                max-width: none;
                width: 100%;
                padding: 10px;
            }

            .store-logo {
                font-size: 20px;
            }

            .separator {
                border-top: 1px solid #333;
            }
        }

        @media (max-width: 480px) {
            .receipt-container {
                margin: 0 10px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <button class="print-button" onclick="printReceipt()">📄 Cetak Struk</button>
    
    <div class="receipt-container" id="receiptContainer">
        <div id="receiptContent">
            <!-- Content will be populated by JavaScript -->
        </div>
    </div>

    <script>
        function formatCurrency(amount) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
            }).format(amount).replace('IDR', 'Rp');
        }

        function loadReceiptData() {
            try {
                const orderData = localStorage.getItem('lastOrderReceipt');
                
                if (!orderData) {
                    showNoDataMessage();
                    return;
                }

                const data = JSON.parse(orderData);
                renderReceipt(data);
            } catch (error) {
                console.error('Error loading receipt data:', error);
                showNoDataMessage();
            }
        }

        function showNoDataMessage() {
            document.getElementById('receiptContent').innerHTML = `
                <div class="no-data">
                    <h3>❌ Tidak ada data pesanan</h3>
                    <p>Tidak ada data pesanan untuk ditampilkan</p>
                    <p style="margin-top: 10px; font-size: 12px;">
                        Silakan lakukan pemesanan terlebih dahulu melalui kasir.
                    </p>
                </div>
            `;
        }

        function renderReceipt(data) {
            const content = `
                <div class="receipt-header">
            <div style="margin-bottom: 8px;">
                <div class="store-logo">🖨️ TIDURLAH GRAFIKA</div>
                <div class="store-info" style="font-size: 10px; margin-bottom: 2px;">"Cetak apa aja, Tidurlah Grafika!"</div>
                <div class="store-info" style="font-size: 10px; margin-bottom: 2px;">Perum. Korpri Raya, Blok D3. No. 3</div>
                <div class="store-info" style="font-size: 10px;">Sukarame, Bandar Lampung</div>
            </div>
            <div class="separator"></div>
            <div class="store-info" style="font-size: 10px;">WhatsApp: 085172157808</div>
            <div class="store-info" style="font-size: 10px;">Instagram: @tidurlah_grafika</div>
        </div>

        <div class="separator"></div>

        <div class="receipt-meta">
            <div><strong>No. Transaksi:</strong> ${data.receiptId}</div>
            <div><strong>Tanggal:</strong> ${data.timestamp}</div>
            <div><strong>Kasir:</strong> ${data.cashier}</div>
        </div>

        ${data.shipping ? `
        <div class="separator"></div>
        
        <div class="receipt-meta">
            <div style="font-weight: bold; margin-bottom: 8px; text-align: center;">INFORMASI PENGIRIMAN</div>
            <div><strong>Nama:</strong> ${data.shipping.customerName}</div>
            <div><strong>Telp:</strong> ${data.shipping.customerPhone}</div>
            <div><strong>Alamat:</strong> ${data.shipping.address}</div>
            <div>${data.shipping.city} ${data.shipping.postalCode}</div>
            ${data.shipping.notes ? `<div><strong>Catatan:</strong> ${data.shipping.notes}</div>` : ''}
        </div>
        ` : ''}

        <div class="separator"></div>

        <div class="items-list">
            <div style="text-align: center; font-weight: bold; margin-bottom: 8px;">DETAIL PEMBELIAN</div>
            ${data.items.map(item => `
                <div class="item">
                    <div class="item-name">${item.name}</div>
                    ${item.width && item.height ? `<div class="store-info" style="font-size: 10px; margin-bottom: 2px;">Ukuran: ${item.width}m x ${item.height}m</div>` : ''}
                    ${item.modelCode ? `<div class="store-info" style="font-size: 10px; margin-bottom: 2px;">Model: ${item.modelCode}</div>` : ''}
                    ${item.caseVariant ? `<div class="store-info" style="font-size: 10px; margin-bottom: 2px;">Casing: ${item.caseVariant}</div>` : ''}
                    ${item.laminationVariant ? `<div class="store-info" style="font-size: 10px; margin-bottom: 2px;">Laminasi: ${item.laminationVariant}</div>` : ''}
                    <div class="item-details">
                        <span>${item.quantity} x ${formatCurrency(item.price)}</span>
                        <span>${formatCurrency(item.subtotal)}</span>
                    </div>
                </div>
            `).join('')}
        </div>

        <div class="separator"></div>

        <div class="summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span>${formatCurrency(data.summary.subtotal)}</span>
            </div>
            ${data.summary.discount > 0 ? `
                <div class="summary-row" style="color: #e74c3c;">
                    <span>Diskon:</span>
                    <span>- ${formatCurrency(data.summary.discount)}</span>
                </div>
            ` : ''}
            <div class="summary-row total-row">
                <span>TOTAL:</span>
                <span>${formatCurrency(data.summary.total)}</span>
            </div>
        </div>

        <div class="separator"></div>

        <div class="footer">
            <div class="footer-message">✨ Terima kasih telah berbelanja! ✨</div>
            <div style="font-size: 10px; color: #666;">Barang yang sudah dibeli tidak dapat dikembalikan</div>
            <div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed #333; font-size: 9px; color: #888; font-style: italic; text-align: center;">
                Struk ini dibuat untuk kemudahan estimasi biaya.<br/>
                Tidak dapat digunakan sebagai bukti pembayaran.
            </div>
            <div style="font-size: 9px; color: #666; margin-top: 8px;">
                Struk ini dibuat secara otomatis pada ${new Date().toLocaleString('id-ID')}
            </div>
        </div>
            `;

            document.getElementById('receiptContent').innerHTML = content;
        }

        function printReceipt() {
            window.print();
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadReceiptData);
    </script>
</body>
</html>
